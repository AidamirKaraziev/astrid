# =============================================================================
# Astra — полный стек в Docker
#
# Одна команда (тесты → сборка → запуск):
#   make up
#   ./scripts/docker-up.sh
#
# Только инфраструктура (dev на хосте):
#   docker compose up -d postgres redis
#
# Только тесты в контейнере:
#   docker compose --profile test run --rm test
# =============================================================================

name: astra

x-app-build: &app-build
  context: .
  dockerfile: Dockerfile

# Внутренние URL сервисов Docker-сети (перекрывают localhost из .env)
x-app-env: &app-env
  APP_ENV: production
  DEBUG: "false"
  DATABASE_URL: postgresql+asyncpg://astra:astra@postgres:5432/astra
  REDIS_URL: redis://redis:6379/0
  FSM_STORAGE: redis
  RABBITMQ_URL: amqp://astra:astra@rabbitmq:5672/
  RABBITMQ_ENABLED: "true"
  OLLAMA_BASE_URL: http://ollama:11434
  OLLAMA_ENABLED: "true"

services:
  # ---------------------------------------------------------------------------
  # Инфраструктура
  # ---------------------------------------------------------------------------

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: astra
      POSTGRES_PASSWORD: astra
      POSTGRES_DB: astra
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U astra -d astra"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: astra
      RABBITMQ_DEFAULT_PASS: astra
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # Одноразовая загрузка модели LLM (может занять несколько минут)
  ollama-init:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["/bin/sh", "-c", "ollama pull qwen2.5:7b || true"]
    restart: "no"

  # ---------------------------------------------------------------------------
  # Тесты перед сборкой приложения (profile: test)
  # ---------------------------------------------------------------------------

  test:
    profiles: [test]
    build:
      <<: *app-build
      target: dev
    environment:
      <<: *app-env
      TELEGRAM_BOT_TOKEN: "0000000000:TEST_TOKEN_FOR_CI"
      TELEGRAM_BOT_USERNAME: TestAstraBot
      TELEGRAM_MODE: polling
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             pytest -v --cov=astra --cov-report=term-missing"

  # ---------------------------------------------------------------------------
  # Приложение
  # ---------------------------------------------------------------------------

  api:
    build:
      <<: *app-build
      target: runtime
    env_file:
      - .env
    environment:
      <<: *app-env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             uvicorn astra.main:app --host 0.0.0.0 --port 8000 --app-dir src"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 180s

  worker:
    build:
      <<: *app-build
      target: runtime
    env_file:
      - .env
    environment:
      <<: *app-env
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      ollama:
        condition: service_started
    command: >
      sh -c "alembic upgrade head && astra-worker"
    restart: unless-stopped

volumes:
  postgres_data:
  ollama_data:
