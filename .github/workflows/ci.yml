name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: astra
          POSTGRES_PASSWORD: astra
          POSTGRES_DB: astra
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U astra -d astra"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run migrations
        env:
          DATABASE_URL: postgresql+asyncpg://astra:astra@localhost:5432/astra
        run: uv run alembic upgrade head

      - name: Pytest
        env:
          DATABASE_URL: postgresql+asyncpg://astra:astra@localhost:5432/astra
          REDIS_URL: redis://localhost:6379/0
          TELEGRAM_BOT_TOKEN: "0000000000:TEST_TOKEN_FOR_CI"
          TELEGRAM_BOT_USERNAME: TestAstraBot
          TELEGRAM_MODE: polling
        run: uv run pytest -v --cov=astra --cov-report=term-missing
